# Stable output rules; Omarchy handles laptop-display toggling on lid events.
env = GDK_SCALE,2

# Framework 13 internal panel.
monitor=eDP-1,2880x1920@120,auto,2

# Dell U2725QE, matched by EDID description because USB-C connector names vary.
monitor=desc:Dell Inc. DELL U2725QE 6WG0G84,preferred,auto,1.5

# Sensible defaults for any other display.
monitor=,preferred,auto,auto
